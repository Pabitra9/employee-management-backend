<svg viewBox="0 0 1040 380" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="1040" height="380" fill="#ffffff"/>
  <text x="520" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Forgot / Reset Password — Flow (low-fidelity)</text>
  <text x="520" y="50" text-anchor="middle" font-size="12" fill="#64748b">All three screens are public. Token is single-use and valid for 15 minutes.</text>

  <!-- ============ CARD 1: LOGIN ============ -->
  <text x="40" y="70" font-size="12" font-weight="bold" fill="#2563eb">1 · LOGIN  /login</text>
  <rect x="30" y="76" width="280" height="206" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="170" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Sign in</text>
  <text x="46" y="120" font-size="9" fill="#64748b">Email</text>
  <rect x="46" y="124" width="248" height="18" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="46" y="158" font-size="9" fill="#64748b">Password</text>
  <rect x="46" y="162" width="248" height="18" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="46" y="190" width="248" height="22" rx="4" fill="#2563eb"/>
  <text x="170" y="205" text-anchor="middle" font-size="10" fill="#ffffff">Log In</text>
  <!-- forgot password link highlighted -->
  <rect x="160" y="224" width="134" height="22" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-dasharray="4 3"/>
  <text x="227" y="239" text-anchor="middle" font-size="10" fill="#2563eb">Forgot password? →</text>
  <text x="170" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">POST /auth/login</text>

  <!-- arrow 1 -> 2 -->
  <line x1="312" y1="150" x2="378" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="142" text-anchor="middle" font-size="9" fill="#2563eb">click</text>

  <!-- ============ CARD 2: FORGOT ============ -->
  <text x="390" y="70" font-size="12" font-weight="bold" fill="#2563eb">2 · FORGOT  /forgot-password</text>
  <rect x="380" y="76" width="280" height="206" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="520" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Forgot your password?</text>
  <text x="396" y="122" font-size="9" fill="#64748b">Enter your account email</text>
  <text x="396" y="142" font-size="9" fill="#64748b">Email</text>
  <rect x="396" y="146" width="248" height="18" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="396" y="174" width="248" height="22" rx="4" fill="#2563eb"/>
  <text x="520" y="189" text-anchor="middle" font-size="10" fill="#ffffff">Send reset link</text>
  <rect x="396" y="206" width="248" height="30" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="520" y="224" text-anchor="middle" font-size="8.5" fill="#047857">"If that email exists, a link has been sent."</text>
  <text x="520" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">POST /auth/forgot-password</text>

  <!-- arrow 2 -> 3 -->
  <line x1="662" y1="150" x2="728" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="695" y="136" text-anchor="middle" font-size="9" fill="#2563eb">open</text>
  <text x="695" y="146" text-anchor="middle" font-size="9" fill="#2563eb">email link</text>

  <!-- ============ CARD 3: RESET ============ -->
  <text x="740" y="70" font-size="12" font-weight="bold" fill="#2563eb">3 · RESET  /reset-password/:token</text>
  <rect x="730" y="76" width="280" height="206" rx="8" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="870" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Set a new password</text>
  <text x="746" y="120" font-size="9" fill="#64748b">New password</text>
  <rect x="746" y="124" width="248" height="18" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="746" y="158" font-size="9" fill="#64748b">Confirm password</text>
  <rect x="746" y="162" width="248" height="18" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="746" y="190" width="248" height="22" rx="4" fill="#2563eb"/>
  <text x="870" y="205" text-anchor="middle" font-size="10" fill="#ffffff">Reset password</text>
  <text x="870" y="230" text-anchor="middle" font-size="8.5" fill="#dc2626">400 if token invalid / expired / used</text>
  <text x="870" y="268" text-anchor="middle" font-size="9" fill="#94a3b8">POST /auth/reset-password { token, password }</text>

  <!-- return arrow 3 -> 1 (success) -->
  <path d="M 870 292 L 870 330 L 170 330 L 170 292" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="430" y="320" width="180" height="20" rx="10" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="520" y="334" text-anchor="middle" font-size="10" fill="#047857">success → redirect to /login</text>
</svg>
